# Supabase config — OpenPolitics, Opposition Narrative Intelligence Platform.
# Shared-schema multi-tenant: one Supabase project holds all tenants, isolated by tenant_id + RLS.
# The HOSTED project region is set per the tenant jurisdiction profile; the launch IN-DPDP profile
# pins an India region (e.g. ap-south-1 / Mumbai) to keep personal data in-country (Principle VIII).

project_id = "openpolitics"

[api]
enabled = true
port = 54321
# pgmq is used only inside SQL (not over the API), so pgmq_public is not exposed here.
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
# Tenant staff only (Admin / Analyst), provisioned by a tenant Admin. No open signup.
enable_signup = false

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# --- Per-function auth ---
# Node-facing coordinator endpoints: nodes have NO Supabase JWT — they authenticate with a
# tenant-scoped node token that the function verifies itself (HMAC vs node.token_hash). The gateway
# JWT check MUST be disabled for these.
[functions.node-register]
verify_jwt = false
[functions.work-lease]
verify_jwt = false
[functions.submit]
verify_jwt = false
[functions.heartbeat]
verify_jwt = false

# All other functions keep verify_jwt = true (default):
#   - alert-triage / detection-settings : called by the war-room SPA with the signed-in user's JWT
#     (RLS + current_tenant() apply).
#   - enrich / detect-narratives / coordination-detect / assign-work / reconcile / media-dispatch /
#     retention-purge : invoked by pg_cron with the service-role key as the bearer (see 0005_cron.sql).
#
# pg_cron / pgmq / pg_net / vector / vault ship with the local Postgres image and are enabled via
# migrations; no extra config here. Vault/function-secrets hold the commenter-hash key and the cron
# service-role key. No raw commenter handle, credential, or session cookie is ever stored or logged.
